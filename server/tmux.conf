# Config for the jarvis-managed tmux server (socket -L jarvis).
# Goal: the attached client should look and feel like a bare `claude` CLI in a
# plain terminal — no status bar, truecolor, working mouse-wheel scrollback,
# and copy that reaches the browser clipboard via OSC 52.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",xterm-256color:clipboard"
set -g set-clipboard on
set -g status off
set -g history-limit 50000
set -g mouse on
set -g window-size latest
set -g focus-events on
set -s escape-time 0
